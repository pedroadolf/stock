global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'stock-nextjs'
    scheme: https
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['stock.pash.uno:443']
    tls_config:
      insecure_skip_verify: true
    relabel_configs:
      - target_label: 'service'
        replacement: 'stock-app'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
